<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <main>
        <header>
            <h1>Gestor de Funcionários</h1>
        </header>
        <section class="form-section">
            <h2>Cadastro / Edição de funcionário</h2>
            <form class="funcionarioForm">
                <input type="hidden" id="id">
                <input type="text" id="nome" placeholder="Nome" required>
                <input type="text" id="cargo" placeholder="Cargo" required>
                <input type="number" id="salario" placeholder="Salário" required>
                <button type="submit">Salvar</button>
            </form>
        </section>
        <section id="list-section">
            <h2>Lista de funcionários</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Cargo</th>
                        <th>Salário</th>
                        <th>Ações</th>
                    </tr>
                </thead>
            </table>
            <tbody id="tabelaFuncionarios"></tbody>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
