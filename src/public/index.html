<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <body>
        <header>
            <h1>Gerenciador de funcionários</h1>
        </header>
        <main class="container">
            <section class="form-section">
                <form id="funcionarioForm">
                    <input type="hidden" id="id">
                    <input type="text" id="nome" placeholder="Nome" required>
                    <input type="text" id="cargo" placeholder="Cargo" required>
                    <input type="number" id="salario" placeholder="Salário" required>
                    <button type="submit">Salvar</button>
                </form>
            </section>

            <section class="list-section">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Cargo</th>
                            <th>Salário</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-funcionarios"></tbody>
                </table>
            </section>
        </main>
        <footer>
            <p>Sistema desenvolvido por Rafael 2026</p>
        </footer>
        <script src="script.js"></script>
    </body>
</body>

</html>
