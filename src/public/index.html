<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Funcionarios</title>
</head>

<body>
    <main class="container">
        <header>
            <h1>Sistema de gerenciamento de Funcionários</h1>
        </header>
        <section class="form-section">
            <h2>Cadastrar / Atualizar Funcionário</h2>

            <form id="formFuncionario">
                <input type="hidden" id="id">
                <input type="text" id="nome" placeholder="Nome" required>
                <input type="text" id="cargo" placeholder="Cargo" required>
                <input type="number" id="salario" placeholder="Salario" required>
                <button type="submit">Salvar</button>
            </form>
        </section>
        <section class="list-section">
            <h2>Tabela funcionários</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Cargo</th>
                        <th>Salário</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-funcionarios"></tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
