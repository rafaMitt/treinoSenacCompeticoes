<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container- fluid"
        style="margin-top: 10%; max-width: 50%; display: block; margin-left: auto; margin-right: auto; background-color: #e2e2e2; padding: 20px; border-radius: 10px;">
        <h1>Cadastro de Livros</h1>
        <form class="row g-3" style="margin: auto;">
            <div class="col-md-6">
                <label for="inputEmail4" class="form-label">Título</label>
                <input type="email" class="form-control" id="title">
            </div>
            <div class="col-md-6">
                <label for="inputPassword4" class="form-label">Autor</label>
                <input type="password" class="form-control" id="author">
            </div>
            <div class="col-12">
                <label for="inputAddress" class="form-label">Descrição</label>
                <input type="text" class="form-control" id="description" placeholder="">
            </div>
            <div class="col-12">
                <label for="inputAddress2" class="form-label">Ano de Publicação</label>
                <input type="number" class="form-control" id="publicationYear" placeholder="">
            </div>

            <div class="col-md-4">
                <label for="inputState" class="form-label">Categoria</label>
                <select id="category" class="form-select">
                    <option selected>Escolha uma categoria</option>
                    <option>Literatura</option>
                    <option>Ciência</option>
                    <option>Tecnologia</option>
                </select>
            </div>
            <div class="col-12">
                <button onclick="cadastroLivro()" type="submit" class="btn btn-primary">Cadastrar</button>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
</body>

</html>
